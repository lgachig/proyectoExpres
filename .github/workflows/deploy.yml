name: CD Pipelines

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: develop

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: |
          docker build -t lgachig/proyectoexpress-backend ./apps/backend
          docker push lgachig/proyectoexpress-backend

      - name: Build Frontend
        run: |
          docker build -t lgachig/proyectoexpress-frontend ./apps/frontend
          docker push lgachig/proyectoexpress-frontend

      - name: Deploy Backend en EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST_BACKEND }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull lgachig/proyectoexpress-backend
            docker stop backend || true
            docker rm backend || true
            docker run -d -p 3000:3000 --name backend lgachig/proyectoexpress-backend

      - name: Deploy Frontend en EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST_FRONTEND }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull lgachig/proyectoexpress-frontend
            docker stop frontend || true
            docker rm frontend || true
            docker run -d -p 5173:5173 --name frontend lgachig/proyectoexpress-frontend