name: CD Pipelines

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: develop

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: |
          docker build -t lgachig/proyectoexpress-backend ./apps/backend
          docker push lgachig/proyectoexpress-backend

      - name: Build Frontend
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=http://${{ secrets.EC2_HOST_BACKEND }}:3000 \
            --build-arg VITE_DOG_INITIAL_PAGE=2 \
            --build-arg VITE_DOG_PAGE_SIZE=2 \
            -t lgachig/proyectoexpress-frontend ./apps/frontend
          docker push lgachig/proyectoexpress-frontend

      - name: Deploy Backend en EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST_BACKEND }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker network create escuela-net || true
            docker pull postgres:15-alpine
            docker stop db || true
            docker rm db || true
            docker run -d \
              --name db \
              --network escuela-net \
              -e POSTGRES_USER=admin \
              -e POSTGRES_PASSWORD=admin \
              -e POSTGRES_DB=escuela_db \
              -p 5432:5432 \
              postgres:15-alpine

            docker pull lgachig/proyectoexpress-backend
            docker stop backend || true
            docker rm backend || true
            docker run -d -p 3000:3000 \
              --network escuela-net \
              -e PORT=3000 \
              -e CORS_ORIGIN=http://${{ secrets.EC2_HOST_FRONTEND }}:5173 \
              -e DB_HOST=db \
              -e DB_PORT=5432 \
              -e DB_USER=admin \
              -e DB_PASSWORD=admin \
              -e DB_NAME=escuela_db \
              -e DOG_API_BASE_URL=https://dogapi.dog/api/v2 \
              -e DOG_API_BREEDS_PATH=/breeds \
              --name backend \
              lgachig/proyectoexpress-backend

      - name: Deploy Frontend en EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST_FRONTEND }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull lgachig/proyectoexpress-frontend
            docker stop frontend || true
            docker rm frontend || true
            docker run -d -p 5173:5173 \
              --name frontend \
              lgachig/proyectoexpress-frontend