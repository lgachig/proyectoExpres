services:
  db:
    image: postgres:15-alpine
    container_name: escuela_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: escuela_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d escuela_db']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: escuela_adminer
    depends_on:
      - db
    ports:
      - '8080:8080'

  backend:
    build:
      context: ./backend
    container_name: escuela_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: escuela_db
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: escuela_frontend
    depends_on:
      - backend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
